---
apiVersion: v1
kind: Service
metadata:
  name: bifrost
spec:
  selector:
    app.kubernetes.io/name: bifrost
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bifrost
  labels:
    app.kubernetes.io/name: bifrost
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bifrost
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bifrost
    spec:
      containers:
      - name: bifrost
        image: maximhq/bifrost
        ports:
        - containerPort: 8080
        env:
        - name: APP_PORT
          value: "8080"
        - name: APP_HOST
          value: 0.0.0.0
        - name: LOG_LEVEL
          value: debug
        - name: LOG_STYLE
          value: pretty
        volumeMounts:
        - name: appdir
          mountPath: /app/data
          readOnly: false
        - name: tmpdir
          mountPath: /tmp
          readOnly: false
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
      volumes:
      - name: appdir
        emptyDir: {}
      - name: tmpdir
        emptyDir:
          medium: Memory
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
